<!doctype html>
<html>
  <head>
    <title>Bar Chart Race</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>

  <body>
    <button>Stop</button>
    <div>
      <select id="medal-filter">
        <option value="total">All Medals</option>
        <option value="gold">Gold</option>
        <option value="silver">Silver</option>
        <option value="bronze">Bronze</option>
      </select>
    </div>
    <svg id="bar-chart-race">
      <g class="chart-container">
        <text class="chart-title"></text>
        <g class="x-axis"></g>
        <g class="y-axis"></g>
        <g class="columns"></g>
        <text class="current-date"></text>
      </g>
    </svg>
    <script src="src/dataGenerator.js"></script>
    <script src="src/BarChartRace.js"></script>
    <script src="src/index.js"></script>
  </body>
</html>
